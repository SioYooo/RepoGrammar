name: Bug report
description: Report a reproducible RepoGrammar bug.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands
      description: Paste the exact commands you ran.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect RepoGrammar to do?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include sanitized output. Do not paste private source, credentials, prompts, or repository names.
      render: text
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - MCP
        - installer
        - indexing
        - UNKNOWN behavior
        - telemetry
        - documentation
        - release/npm
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `repogrammar version`, commit SHA, or source checkout branch.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Commands you ran to verify the issue or a fix.
      render: text
