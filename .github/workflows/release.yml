name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: Build and smoke-test release artifacts without publishing
        required: true
        default: build-only
        type: choice
        options:
          - build-only

permissions:
  contents: read

jobs:
  verify:
    name: Verify release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Verify tag and version agreement
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          cargo_version="$(awk -F' *= *' '
            /^\[/ { section = $0 }
            section == "[package]" && $1 == "version" { gsub(/"/, "", $2); print $2; exit }
          ' Cargo.toml)"
          echo "package.json version: ${package_version}"
          echo "Cargo.toml version:   ${cargo_version}"
          if [ -z "${package_version}" ] || [ -z "${cargo_version}" ]; then
            echo "could not resolve package.json and Cargo.toml versions" >&2
            exit 1
          fi
          if [ "${package_version}" != "${cargo_version}" ]; then
            echo "version mismatch: package.json=${package_version} Cargo.toml=${cargo_version}" >&2
            exit 1
          fi
          # Only a pushed tag is a publication event. A manual dispatch remains
          # build-only even when its selected ref happens to be a tag.
          if [ "${EVENT_NAME}" = "push" ] && [ "${REF_TYPE}" = "tag" ]; then
            if [ "${REF_NAME}" != "v${package_version}" ]; then
              echo "tag ${REF_NAME} does not match v${package_version}" >&2
              exit 1
            fi
            echo "tag ${REF_NAME} matches v${package_version}"
          else
            echo "ref_type=${REF_TYPE} is not a tag; skipping tag/version equality (verify/build only)"
          fi
      - name: Verify publication tag authority
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "publication tag commit is not contained in origin/main" >&2
            exit 1
          fi
          echo "publication tag commit is contained in origin/main"
      - name: Require npm credentials before tag publication
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required before publishing any tag assets" >&2
            exit 1
          fi
          npm whoami --registry https://registry.npmjs.org >/dev/null
          echo "tag publication credentials are present and accepted by npm"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: node src/workers/typescript/worker.test.js
      - run: node src/npm/repogrammar.test.js
      - run: npm_config_cache="${RUNNER_TEMP}/npm-cache" npm pack --dry-run
      - run: python3 src/workers/python/worker.test.py
      - run: bash src/install/repogrammar-install.test.sh
      - run: cargo run --quiet --bin repo-guard -- check

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: repogrammar-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: repogrammar-aarch64-unknown-linux-gnu.tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: repogrammar-x86_64-apple-darwin.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: repogrammar-aarch64-apple-darwin.tar.gz
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Build release binary
        run: cargo build --release --bin repogrammar --target "${{ matrix.target }}"
      - name: Inspect Linux glibc ABI floor
        if: contains(matrix.target, 'unknown-linux-gnu')
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/repogrammar"
          required="$(objdump -T "${binary}" | sed -n 's/.*(GLIBC_\([0-9][0-9.]*\)).*/\1/p' | sort -V | tail -n 1)"
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu) floor="2.35" ;;
            aarch64-unknown-linux-gnu) floor="2.39" ;;
            *) echo "unexpected Linux target" >&2; exit 1 ;;
          esac
          if [ -z "${required}" ]; then
            echo "could not inspect the packaged binary's glibc symbol requirements" >&2
            exit 1
          fi
          highest="$(printf '%s\n%s\n' "${required}" "${floor}" | sort -V | tail -n 1)"
          if [ "${highest}" != "${floor}" ]; then
            echo "binary requires glibc ${required}, above declared floor ${floor}" >&2
            exit 1
          fi
          echo "binary glibc requirement ${required} is within declared floor ${floor}"
      - name: Package release archive
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/repogrammar" dist/repogrammar
          mkdir -p dist/workers/python
          cp src/workers/python/worker.py dist/workers/python/worker.py
          chmod 755 dist/repogrammar
          tar -czf "${{ matrix.archive }}" -C dist repogrammar workers
          shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
        shell: bash
      - name: Smoke packaged artifact
        shell: bash
        run: |
          set -euo pipefail
          smoke_root="${RUNNER_TEMP}/repogrammar-package-smoke"
          mkdir -p "${smoke_root}/unpacked"
          tar -xzf "${{ matrix.archive }}" -C "${smoke_root}/unpacked"
          binary="${smoke_root}/unpacked/repogrammar"
          worker="${smoke_root}/unpacked/workers/python/worker.py"
          test -x "${binary}"
          test -f "${worker}"
          python3 -c 'import sys; assert sys.version_info >= (3, 10), "RepoGrammar requires Python 3.10+"'
          expected_version="$(node -p "require('./package.json').version")"
          cargo run --quiet --bin repo-guard -- smoke-packaged-artifact \
            --binary "${binary}" \
            --worker "${worker}" \
            --fixture src/fixtures/python/release/v0_1/pydantic-basic/schemas.py \
            --expected-version "${expected_version}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
          if-no-files-found: error

  publish_release:
    name: Publish staged GitHub release assets
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Add installer scripts
        run: |
          cp src/install/repogrammar-install.sh release-assets/install.sh
          cd release-assets
          sha256sum install.sh > install.sh.sha256
      - uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          files: release-assets/*

  publish_npm:
    name: Publish npm launcher after GitHub assets
    needs: publish_release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: node src/npm/repogrammar.test.js
      - run: npm_config_cache="${RUNNER_TEMP}/npm-cache" npm pack --dry-run
      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN disappeared after the publication preflight" >&2
            exit 1
          fi
          npm publish --access public --tag preview

  reconcile_npm_tags:
    name: Verify npm preview dist-tags
    needs: publish_npm
    if: github.event_name == 'push' && github.ref_type == 'tag'
    permissions:
      contents: read
    uses: ./.github/workflows/npm-tag-reconcile.yml
