name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: node src/workers/typescript/worker.test.js
      - run: node src/npm/repogrammar.test.js
      - run: npm_config_cache="${RUNNER_TEMP}/npm-cache" npm pack --dry-run
      - run: python3 src/workers/python/worker.test.py
      - run: bash src/install/repogrammar-install.test.sh
      - run: cargo run --quiet --bin repo-guard -- check
      - if: github.event_name == 'pull_request'
        run: cargo run --quiet --bin repo-guard -- check-diff --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

  macos-product-smoke:
    name: macOS Rust and onboarding smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests on macOS
        run: cargo test --workspace --all-features
      - name: Build and exercise isolated product setup
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --bin repogrammar
          smoke_root="${RUNNER_TEMP}/repogrammar-macos-smoke"
          mkdir -p "${smoke_root}/home" "${smoke_root}/project" "${smoke_root}/tools"
          ln -s "$(command -v git)" "${smoke_root}/tools/git"
          ln -s "$(command -v python3)" "${smoke_root}/tools/python3"
          tool_path="${smoke_root}/tools"
          binary="${PWD}/target/release/repogrammar"
          "${binary}" version
          HOME="${smoke_root}/home" PATH="${tool_path}" "${binary}" setup \
            --project "${smoke_root}/project" --target auto --dry-run --no-autosync \
            --json --progress never > "${smoke_root}/dry-run.json"
          python3 -c 'import json,sys; v=json.load(open(sys.argv[1])); assert v["status"] == "dry_run" and not v["repository_index_ready"]' "${smoke_root}/dry-run.json"
          printf 'def macos_smoke():\n    return True\n' > "${smoke_root}/project/app.py"
          HOME="${smoke_root}/home" PATH="${tool_path}" "${binary}" setup \
            --project "${smoke_root}/project" --target auto --yes --no-autosync \
            --json --progress never > "${smoke_root}/live.json"
          python3 -c 'import json,sys; v=json.load(open(sys.argv[1])); assert v["product_self_test_state"] == "passed" and v["repository_index_ready"] and not v["agent_query_ready"] and v["suggested_question"] is None' "${smoke_root}/live.json"
