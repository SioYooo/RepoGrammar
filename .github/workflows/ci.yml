name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: node src/workers/typescript/worker.test.js
      - run: node src/npm/repogrammar.test.js
      - run: npm_config_cache="${RUNNER_TEMP}/npm-cache" npm pack --dry-run
      - run: python3 src/workers/python/worker.test.py
      - run: bash src/install/repogrammar-install.test.sh
      - run: cargo run --quiet --bin repo-guard -- check
      - if: github.event_name == 'pull_request'
        run: cargo run --quiet --bin repo-guard -- check-diff --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

  macos-product-smoke:
    name: macOS Rust and packaged product smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Run Rust tests on macOS
        run: cargo test --workspace --all-features
      - name: Build and exercise packaged product lifecycle
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --bin repogrammar
          smoke_root="${RUNNER_TEMP}/repogrammar-macos-smoke"
          mkdir -p "${smoke_root}/package/workers/python" "${smoke_root}/unpacked"
          cp target/release/repogrammar "${smoke_root}/package/repogrammar"
          cp src/workers/python/worker.py "${smoke_root}/package/workers/python/worker.py"
          tar -czf "${smoke_root}/repogrammar.tar.gz" -C "${smoke_root}/package" repogrammar workers
          tar -xzf "${smoke_root}/repogrammar.tar.gz" -C "${smoke_root}/unpacked"
          expected_version="$(node -p "require('./package.json').version")"
          cargo run --quiet --bin repo-guard -- smoke-packaged-artifact \
            --binary "${smoke_root}/unpacked/repogrammar" \
            --worker "${smoke_root}/unpacked/workers/python/worker.py" \
            --fixture src/fixtures/python/release/v0_1/pydantic-basic/schemas.py \
            --expected-version "${expected_version}"

  linux-packaged-product-smoke:
    name: Linux packaged product lifecycle smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Build and exercise packaged product lifecycle
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --bin repogrammar
          smoke_root="${RUNNER_TEMP}/repogrammar-linux-smoke"
          mkdir -p "${smoke_root}/package/workers/python" "${smoke_root}/unpacked"
          cp target/release/repogrammar "${smoke_root}/package/repogrammar"
          cp src/workers/python/worker.py "${smoke_root}/package/workers/python/worker.py"
          tar -czf "${smoke_root}/repogrammar.tar.gz" -C "${smoke_root}/package" repogrammar workers
          tar -xzf "${smoke_root}/repogrammar.tar.gz" -C "${smoke_root}/unpacked"
          expected_version="$(node -p "require('./package.json').version")"
          cargo run --quiet --bin repo-guard -- smoke-packaged-artifact \
            --binary "${smoke_root}/unpacked/repogrammar" \
            --worker "${smoke_root}/unpacked/workers/python/worker.py" \
            --fixture src/fixtures/python/release/v0_1/pydantic-basic/schemas.py \
            --expected-version "${expected_version}"

  windows-source-installer-contract:
    name: Windows source-only installer contract
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Test source-only PowerShell installer
        shell: pwsh
        run: ./src/install/install.ps1.test.ps1
