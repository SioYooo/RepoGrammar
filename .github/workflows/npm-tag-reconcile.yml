name: Verify npm preview tags

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify npm preview dist-tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Verify preview dist-tags against published versions
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          classify_registry() {
            local attempt tags versions preview latest versions_json action
            for attempt in 1 2 3 4 5; do
              if tags="$(npm view "${package_name}" dist-tags --json --registry https://registry.npmjs.org 2>/dev/null)" \
                && versions="$(npm view "${package_name}" versions --json --registry https://registry.npmjs.org 2>/dev/null)" \
                && preview="$(node -e 'const tags=JSON.parse(process.argv[1]); if (!tags || Array.isArray(tags) || typeof tags !== "object") process.exit(1); process.stdout.write(typeof tags.preview === "string" ? tags.preview : "")' "${tags}")" \
                && latest="$(node -e 'const tags=JSON.parse(process.argv[1]); if (!tags || Array.isArray(tags) || typeof tags !== "object") process.exit(1); process.stdout.write(typeof tags.latest === "string" ? tags.latest : "")' "${tags}")" \
                && versions_json="$(node -e 'const value=JSON.parse(process.argv[1]); const versions=Array.isArray(value) ? value : [value]; process.stdout.write(JSON.stringify(versions))' "${versions}")" \
                && action="$(cargo run --quiet --bin repo-guard -- \
                  preview-dist-tag-action \
                  --version "${package_version}" \
                  --preview "${preview}" \
                  --latest "${latest}" \
                  --versions-json "${versions_json}")"; then
                printf '%s' "${action}"
                return 0
              fi
              if [ "${attempt}" -lt 5 ]; then
                sleep 2
              fi
            done
            echo "npm preview registry state did not satisfy the release gate after bounded retries" >&2
            return 1
          }

          final_action="$(classify_registry)"
          case "${final_action}" in
            no_latest|allow_prerelease_latest_without_stable|preserve_stable_latest)
              echo "npm preview dist-tags satisfy the bounded release policy: ${final_action}"
              ;;
            *)
              echo "repo-guard returned an unknown npm dist-tag action" >&2
              exit 1
              ;;
          esac
