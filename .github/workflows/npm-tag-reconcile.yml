name: Verify npm release tags

on:
  workflow_call:
    inputs:
      channel:
        description: Release channel whose public registry state must be verified
        required: true
        type: string
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel whose public registry state must be verified
        required: true
        default: stable
        type: choice
        options:
          - stable
          - preview

permissions:
  contents: read

jobs:
  verify:
    name: Verify npm ${{ inputs.channel }} dist-tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, pinned 2026-07-20
        with:
          toolchain: stable
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Pin npm CLI
        run: npm install --global npm@11.18.0
      - name: Verify release dist-tags against published versions
        env:
          REQUESTED_CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          test "$(npm --version)" = "11.18.0"
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          manifest_channel="$(cargo run --quiet --locked --bin repo-guard -- release-channel --version "${package_version}")"
          if [ "${REQUESTED_CHANNEL}" != "${manifest_channel}" ]; then
            echo "requested npm channel does not match the checked-out manifest" >&2
            exit 1
          fi

          classify_registry() {
            local attempt tags versions preview latest versions_json action
            for attempt in 1 2 3 4 5; do
              if tags="$(npm view "${package_name}" dist-tags --json --registry https://registry.npmjs.org 2>/dev/null)" \
                && versions="$(npm view "${package_name}" versions --json --registry https://registry.npmjs.org 2>/dev/null)" \
                && preview="$(node -e 'const tags=JSON.parse(process.argv[1]); if (!tags || Array.isArray(tags) || typeof tags !== "object") process.exit(1); process.stdout.write(typeof tags.preview === "string" ? tags.preview : "")' "${tags}")" \
                && latest="$(node -e 'const tags=JSON.parse(process.argv[1]); if (!tags || Array.isArray(tags) || typeof tags !== "object") process.exit(1); process.stdout.write(typeof tags.latest === "string" ? tags.latest : "")' "${tags}")" \
                && versions_json="$(node -e 'const value=JSON.parse(process.argv[1]); const versions=Array.isArray(value) ? value : [value]; process.stdout.write(JSON.stringify(versions))' "${versions}")" \
                && action="$(cargo run --quiet --locked --bin repo-guard -- \
                  release-dist-tag-action \
                  --version "${package_version}" \
                  --preview "${preview}" \
                  --latest "${latest}" \
                  --tags-json "${tags}" \
                  --versions-json "${versions_json}")"; then
                printf '%s' "${action}"
                return 0
              fi
              if [ "${attempt}" -lt 5 ]; then
                sleep 2
              fi
            done
            echo "npm registry state did not satisfy the release gate after bounded retries" >&2
            return 1
          }

          final_action="$(classify_registry)"
          case "${manifest_channel}:${final_action}" in
            preview:no_latest|preview:allow_prerelease_latest_without_stable|preview:preserve_stable_latest)
              echo "npm preview dist-tags satisfy the bounded release policy: ${final_action}"
              ;;
            stable:stable_latest_verified)
              echo "npm stable latest and preserved preview tags satisfy the bounded release policy"
              ;;
            *)
              echo "repo-guard returned an action inconsistent with the release channel" >&2
              exit 1
              ;;
          esac
